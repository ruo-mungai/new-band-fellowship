# render.yaml - Fixed for free tier
services:
  # Your Node.js backend API service
  - type: web
    name: newband-api
    runtime: node
    repo: https://github.com/ruo-mungai/new-band-fellowship
    rootDir: server
    plan: free
    region: frankfurt
    branch: main
    buildCommand: npm install && npx prisma generate
    # ❌ REMOVE this line: preDeployCommand: npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: newband-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: NODE_ENV
        value: production

# One-off job for seeding (this is fine - jobs work differently)
jobs:
  - type: job
    name: seed-database
    runtime: node
    repo: https://github.com/ruo-mungai/new-band-fellowship
    rootDir: server
    plan: free
    region: frankfurt
    branch: main
    buildCommand: npm install
    startCommand: npx prisma db seed
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: newband-db
          property: connectionString

databases:
  - name: newband-db
    plan: free
    region: frankfurt