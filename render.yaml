# render.yaml - Correct syntax with jobs
services:
  # Your main web service
  - type: web
    name: newband-api
    runtime: node
    repo: https://github.com/ruo-mungai/new-band-fellowship
    rootDir: server
    plan: free
    region: frankfurt
    branch: main
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: newband-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: NODE_ENV
        value: production

  # Separate job for migrations
  - type: job
    name: newband-migrations
    runtime: node
    repo: https://github.com/ruo-mungai/new-band-fellowship
    rootDir: server
    plan: free
    region: frankfurt
    branch: main
    buildCommand: npm install
    startCommand: npx prisma migrate deploy
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: newband-db
          property: connectionString

  # Separate job for seeding
  - type: job
    name: newband-seed
    runtime: node
    repo: https://github.com/ruo-mungai/new-band-fellowship
    rootDir: server
    plan: free
    region: frankfurt
    branch: main
    buildCommand: npm install
    startCommand: npx prisma db seed
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: newband-db
          property: connectionString

databases:
  - name: newband-db
    plan: free
    region: frankfurt